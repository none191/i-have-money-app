# Shared security headers, included inside every `location` block below.
#
# IMPORTANT nginx gotcha this file works around: add_header directives are
# only inherited from a parent block (http/server) if the current block
# defines NO add_header of its own. Every location below also sets its own
# Cache-Control via add_header, which would silently drop these security
# headers if they were only declared once at the server level. Including
# this file inside each location re-declares them in that location's own
# scope so they always apply together with the Cache-Control for that
# location.
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://lh3.googleusercontent.com; connect-src 'self' https://accounts.google.com https://www.googleapis.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
