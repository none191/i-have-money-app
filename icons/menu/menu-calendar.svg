<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="ปฏิทิน">
  <title>ปฏิทิน</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7a6a52" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#eadbbd"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9bab7a"/>
      <stop offset="100%" stop-color="#5f7350"/>
    </linearGradient>
    <linearGradient id="beige" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c79e"/>
      <stop offset="100%" stop-color="#b98555"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd88a"/>
      <stop offset="100%" stop-color="#d59a31"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d99a76"/>
      <stop offset="100%" stop-color="#a95f43"/>
    </linearGradient>
    <style>
      .stroke{stroke:#77664f;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .sage{fill:url(#sage)}
      .cream{fill:url(#cream)}
      .beige{fill:url(#beige)}
      .gold{fill:url(#gold)}
      .terra{fill:url(#terra)}
      .leaf{fill:#8fa466;stroke:#6d7f52;stroke-width:4}
      .line{fill:none;stroke:#d1a66e;stroke-width:8;stroke-linecap:round;stroke-dasharray:12 20}
    </style>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="108" y="111" width="296" height="310" rx="36" class="cream"/>
    <path d="M108 150 q0-39 36-39 h224 q36 0 36 39 v55 H108z" class="sage"/>
    <rect x="155" y="73" width="30" height="84" rx="15" class="beige"/>
    <rect x="232" y="73" width="30" height="84" rx="15" class="beige"/>
    <rect x="309" y="73" width="30" height="84" rx="15" class="beige"/>
    <g fill="#f3dfbd">
      <rect x="153" y="234" width="42" height="42" rx="12"/>
      <rect x="222" y="234" width="42" height="42" rx="12"/>
      <rect x="291" y="234" width="42" height="42" rx="12"/>
      <rect x="153" y="303" width="42" height="42" rx="12"/>
      <rect x="222" y="303" width="42" height="42" rx="12"/>
    </g>
    <rect x="291" y="303" width="42" height="42" rx="12" class="sage"/>
        <g transform="translate(338 341) scale(0.7)">
      <path d="M0 90 C30 55 55 25 98 0" fill="none" stroke="#6d7f52" stroke-width="8" stroke-linecap="round"/>
      <ellipse class="leaf" cx="24" cy="62" rx="18" ry="34" transform="rotate(-42 24 62)"/>
      <ellipse class="leaf" cx="52" cy="38" rx="17" ry="31" transform="rotate(-25 52 38)"/>
      <ellipse class="leaf" cx="78" cy="17" rx="16" ry="29" transform="rotate(-15 78 17)"/>
    </g>
  </g>
