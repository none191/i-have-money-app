server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # See nginx-security-headers.conf for why these are `include`-d inside
  # every location block instead of declared once here at server level:
  # any location with its own add_header (all of ours set Cache-Control)
  # silently stops inheriting server-level add_header directives in nginx.
  include /etc/nginx/snippets/security-headers.conf;

  # --- Block dotfiles (.git, .gitignore, .gitattributes, etc.) ----------
  # The web root is the whole repo directory (see docker-compose.yml), so
  # this and the rule below are the actual boundary keeping .git/ objects,
  # README.md, docker-compose*.yml, and docs/ from being served over HTTP.
  location ~ /\. {
    include /etc/nginx/snippets/security-headers.conf;
    deny all;
    return 404;
  }

  # --- Block repo/infra files that must never be served ------------------
  location ~* \.(md|sql|ya?ml)$ {
    include /etc/nginx/snippets/security-headers.conf;
    deny all;
    return 404;
  }

  # --- google.config.js: holds the Google OAuth Client ID. Not a secret
  #     in the security sense (it's a public browser-visible identifier),
  #     but it must never be cached client-side so a device switching
  #     between environments/configs always gets the current value. -----
  location = /google.config.js {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # --- App shell + manifest + service worker: must always revalidate.
  #     The PWA's update-notification flow (service-worker.js) depends on
  #     the browser never serving a stale copy of any of these three. ---
  location ~* ^/(index\.html|manifest\.webmanifest|service-worker\.js)$ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # --- ES module files (lib/*.mjs) imported by the service worker and by
  #     index.html's <script type="module"> tags. Same no-cache policy as
  #     the shell for now (not yet content-hashed -- see PROJECT_MEMORY.md
  #     for the plan to move to hashed filenames + long-lived immutable
  #     caching for a future pass). Explicit MIME type is required: some
  #     default nginx mime.types maps do not include .mjs, and browsers
  #     enforce strict MIME checking for type="module" scripts. ----------
  location ~* \.mjs$ {
    include /etc/nginx/snippets/security-headers.conf;
    default_type application/javascript;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # --- Other static assets: short revalidated cache. Deliberately NOT
  #     "immutable" -- a bare ?v= query string is not a airtight
  #     cache-busting guarantee across every intermediate cache/proxy.
  #     True long-lived immutable caching should wait for content-hashed
  #     filenames (see PROJECT_MEMORY.md). ---------------------------------
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|json)$ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=600, must-revalidate" always;
    try_files $uri =404;
  }

  location / {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
