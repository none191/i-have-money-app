server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|json|webmanifest)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /google.config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}
